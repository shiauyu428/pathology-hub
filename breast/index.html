<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pathology Form Database</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; color: #1a1a1a; height: 100vh; display: flex; flex-direction: column; }

  /* Top bar */
  #topbar { background: #1c2b3a; padding: 12px 20px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
  #topbar h1 { color: #fff; font-size: 15px; font-weight: 600; letter-spacing: 0.3px; white-space: nowrap; }
  #search-wrap { flex: 1; position: relative; }
  #search { width: 100%; padding: 8px 14px 8px 36px; border-radius: 8px; border: none; font-size: 14px; background: #fff; outline: none; }
  #search-wrap::before { content: '🔍'; position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 13px; }
  #count { color: #8da0b3; font-size: 12px; white-space: nowrap; }
  #btn-add { background: #3b82f6; color: #fff; border: none; padding: 8px 16px; border-radius: 8px; font-size: 13px; cursor: pointer; white-space: nowrap; font-weight: 500; }
  #btn-add:hover { background: #2563eb; }

  /* Tag bar */
  #tagbar { background: #fff; border-bottom: 1px solid #e5e7eb; padding: 8px 20px; display: flex; gap: 8px; flex-wrap: wrap; flex-shrink: 0; }
  .tag-btn { border: 1px solid #d1d5db; background: #fff; border-radius: 20px; padding: 4px 14px; font-size: 12px; cursor: pointer; color: #4b5563; transition: all 0.15s; }
  .tag-btn:hover { border-color: #3b82f6; color: #3b82f6; }
  .tag-btn.active { background: #3b82f6; border-color: #3b82f6; color: #fff; }
  .tag-btn.all { font-weight: 600; }

  /* Main layout */
  #main { flex: 1; display: flex; overflow: hidden; }

  /* Left list */
  #list-panel { width: 300px; flex-shrink: 0; background: #fff; border-right: 1px solid #e5e7eb; display: flex; flex-direction: column; overflow: hidden; }
  #list { flex: 1; overflow-y: auto; }
  .note-item { padding: 10px 16px; cursor: pointer; border-bottom: 1px solid #f3f4f6; transition: background 0.1s; }
  .note-item:hover { background: #f0f7ff; }
  .note-item.active { background: #eff6ff; border-left: 3px solid #3b82f6; }
  .note-title { font-size: 13px; font-weight: 500; color: #111; line-height: 1.4; }
  .note-tag { font-size: 11px; color: #6b7280; margin-top: 2px; }
  .note-snippet { font-size: 11px; color: #9ca3af; margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .no-results { padding: 40px 20px; text-align: center; color: #9ca3af; font-size: 13px; }

  /* Right content */
  #content-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #fff; }
  #content-header { padding: 16px 24px 12px; border-bottom: 1px solid #e5e7eb; display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; flex-shrink: 0; }
  #content-title { font-size: 16px; font-weight: 600; color: #111; line-height: 1.4; }
  #content-tag-badge { font-size: 11px; color: #3b82f6; background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 12px; padding: 2px 10px; white-space: nowrap; margin-top: 2px; }
  #content-actions { display: flex; gap: 8px; flex-shrink: 0; }
  .btn-action { border: 1px solid #d1d5db; background: #fff; border-radius: 6px; padding: 6px 12px; font-size: 12px; cursor: pointer; color: #374151; }
  .btn-action:hover { background: #f9fafb; }
  .btn-edit { border-color: #93c5fd; color: #2563eb; }
  .btn-edit:hover { background: #eff6ff; }
  .btn-delete { border-color: #fca5a5; color: #dc2626; }
  .btn-delete:hover { background: #fef2f2; }
  #content-body { flex: 1; overflow-y: auto; padding: 20px 24px; }
  #content-text { font-size: 13.5px; line-height: 1.8; white-space: pre-wrap; color: #1f2937; font-family: 'Menlo', 'Consolas', monospace; }
  #empty-state { flex: 1; display: flex; align-items: center; justify-content: center; color: #9ca3af; font-size: 14px; }

  /* Highlight */
  mark { background: #fef08a; border-radius: 2px; padding: 0 1px; }

  /* Modal */
  #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; }
  #modal-overlay.open { display: flex; }
  #modal { background: #fff; border-radius: 12px; width: 680px; max-width: 95vw; max-height: 90vh; display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
  #modal-header { padding: 20px 24px 16px; border-bottom: 1px solid #e5e7eb; display: flex; justify-content: space-between; align-items: center; }
  #modal-header h2 { font-size: 16px; font-weight: 600; }
  #modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: #6b7280; line-height: 1; }
  #modal-body { padding: 20px 24px; flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 14px; }
  .form-row label { display: block; font-size: 12px; font-weight: 600; color: #374151; margin-bottom: 5px; }
  .form-row input, .form-row select, .form-row textarea { width: 100%; border: 1px solid #d1d5db; border-radius: 6px; padding: 8px 12px; font-size: 13px; outline: none; font-family: inherit; }
  .form-row input:focus, .form-row select:focus, .form-row textarea:focus { border-color: #3b82f6; }
  .form-row textarea { resize: vertical; min-height: 220px; font-family: 'Menlo', 'Consolas', monospace; line-height: 1.6; }
  #modal-footer { padding: 16px 24px; border-top: 1px solid #e5e7eb; display: flex; justify-content: flex-end; gap: 10px; }
  .btn-cancel { background: #fff; border: 1px solid #d1d5db; border-radius: 6px; padding: 8px 18px; font-size: 13px; cursor: pointer; }
  .btn-save { background: #3b82f6; color: #fff; border: none; border-radius: 6px; padding: 8px 18px; font-size: 13px; cursor: pointer; font-weight: 500; }
  .btn-save:hover { background: #2563eb; }

  /* Toast */
  #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(10px); background: #1c2b3a; color: #fff; padding: 10px 20px; border-radius: 8px; font-size: 13px; opacity: 0; transition: all 0.25s; pointer-events: none; z-index: 200; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>

<div id="topbar">
  <h1>Pathology Forms</h1>

<div id="tagbar">

      </div>
      <div class="form-row">
        <label>Content</label>
        <textarea id="f-content" placeholder="Paste template content here..."></textarea>
      </div>
    </div>
    <div id="modal-footer">
      <button class="btn-cancel" id="modal-cancel">Cancel</button>
      <button class="btn-save" id="modal-save">Save</button>
    </div>
  </div>
</div>

<div id="toast"></div>

今天乳癌團隊會議討論決議，core biopsy 結果僅是normal mammary tissue時，病理報告能加註警示，以免臨床醫師誤以為是benign lesion，而錯失進一步處理。

雖然於2015年1月已有發通知給大家，但科內仍有不一致的做法，在此重發通知，並統一電腦系統中的格式。若報告用手寫的同仁，也請用一樣的診斷字句(Normal mammary tissue)，及加註警語 (Note: The specimen may be not representative for the lesion. Re-biopsy is recommended.)。
謝謝！

1.病人通常是在有懷疑病變的情況下做core biopsy，例如palpable mass 或影像下看到病變。所以當我們在core biopsy的切片看到”良性組織”，應該分出是”normal mammary tissue” 或”benign lesion (e.g. Sclerosing adenosis, DH…)”。
2.如果是”normal mammary tissue”，core biopsy很可能沒扎到可疑的病變。臨床或影像懷疑時應做進一步處理。若我們在這樣的情況下，診斷打”benign mammary tissue”，臨床醫師容易會誤以為是benign lesion，而錯失進一步處理。
3.請統一使用電腦報告格式代碼BRE33 (Normal mammary tissue)

Diagnosis:
Normal mammary tissue, right/left breast (,), core biopsy.
Note: The specimen may not be representative of the lesion. Re-biopsy is recommended.
Microscopic Description:
The core biopsy samples contain normal breast ducts and lobules, along with fibrous and adipose stroma. No pathological changes, including microcalcifications or signs of malignancy, are present in the specimens. Based on imaging findings, the specimen may not be representative of the lesion. Re-biopsy is recommended.

ICD code 1"}, {"id": "97c98a64b99c", "title": "Intracerebral hemorrhage [ICH]", "tag": "CNS", "source": "CNS_Form", "content": "intracerebral hemorrhage.

infiltrating the vascular wall without fibrinoid necrosis. No evidence of amyloid deposition is demonstrated by Congo red stain."}, {"id": "3ea80bed836d", "title": "Meningiom (atypical)", "tag": "CNS", "source": "CNS_Form", "content": "Sections show oval to spindle-shaped meningothelial cells arranged in whorled 
patterns. Focal area shows hypercellularity 

with increased mitotic activity (5/10HPF). Necrosis and brain invasion are not discerned.

Immunohistochemically, the proliferation index demonstrated by Ki-67 is around 10%
 in the hypercellular area. 

Taken together, this is an atypical meningioma (WHO grage II)."}, {"id": "802e16c634b5", "title": "Meningioma (chordoid features)", "tag": "CNS", "source": "CNS_Form", "content": "Some areas show cords or trabeculae of eosinophilic cells in an abundant mucoid matrix background, resembling chordoma and accounting for about _% of whole tumor."}, {"id": "d7e1c4ee88b3", "title": "Meningioma (meningothelial)", "tag": "CNS", "source": "CNS_Form", "content": "Meningioma (meningothelial)

Microscopic description:
Section shows oval to spindle-shaped meningothelial cells arranged in fascicles and focal whorls. Neither necrosis or increased mitotic activity are noted."}, {"id": "9b0992888379", "title": "Meningioma (secretory)", "tag": "CNS", "source": "CNS_Form", "content": "Eosinophilic secretion in the intracellular lumina is seen focally (secretory type)."}, {"id": "54cada881ebb", "title": "Meningioma (transitional type with focal chordoid feature and metaplasia)", "tag": "CNS", "source": "CNS_Form", "content": "Sections show a meningioma with a mixed pattern combining those of meningothelial as well as fibrous meningioma. Whorl formation is noted in places. Chordoid feature and metaplastic adipose tissue formation are also observed in focal areas. There is no atypical change, e.g. loss of architecture, increased in mitotic activity, or necrosis, identified in the specimen examination. The MIB-1 labeling index (LI) is 4.

Comment:
Since the tumor shows no atypical features and the MIB-1 LI is low, it should be diagnosed as a grade I meninigioma."}, {"id": "2c98de0ba5c7", "title": "Meningioma (transitional)", "tag": "CNS", "source": "CNS_Form", "content": "Sections show bland-looking tumor cells with oval to spindle nuclei arranged in fascicles and forming whorls.

Microscopic description:
The sections show meningothelial and microcystic meningioma.
There is no evidence of necrosis, brain invasion, sheet-like
growth or increased cellularity. There are no prominent
nucleoli or small cells with high nuclear to cytoplasmic
ratio. Mitotic figures are not identified. A few brain
tissue is present and highlighted by GFAP. No brain invasion
is noted. The dura is focally invaded by tumor.

SSTR2a, consistent with the diagnosis. The Ki67 is low."}, {"id": "2578251934c9", "title": "NOTE: low-grade glioma/Non-representative for the lesion.", "tag": "CNS", "source": "CNS_Form", "content": "Note: The glioma is low-grade in this specimen, which may be

should be considered."}, {"id": "f250ee15fa40", "title": "Pituitary adenoma", "tag": "CNS", "source": "CNS_Form", "content": "LABORATORY DATA: IGF-1 _ ng/mL. ACTH _pg/mL. HGH _uIU/mL. Cortisal _ ug/dL. Prolactin: _ng/mL.

Section shows lymphoid cells composed of predominantly small

No metastatic carcinoma is seen."}, {"id": "9bfad6950b64", "title": "NOTE: If gout is clinically suspected, please send fresh synovial fluid to a clinical laboratory for analysis", "tag": "Cytology", "source": "Cytology_Form", "content": "NOTE: If gout is clinically suspected, please send fresh synovial fluid to a clinical laboratory for analysis."}, {"id": "87d5820d4551", "title": "Note: 請送多一點for cell block", "tag": "Cytology", "source": "Cytology_Form", "content": "Note: Only 3 ml of effusion was received for cell block preparation. Adequate cellularity may not be guaranteed. Please submit a larger volume (minimum 50 ml) for cell block evaluation."}, {"id": "8625a8e5ea60", "title": "PAP SMEAR AGC, favor neoplastic", "tag": "Cytology", "source": "Cytology_Form", "content": "NOTE: A significant percentage of patients with this cytologic interpretation have underlying high-grade squamous or glandular intraepithelial abnomalities. Further diagnostic follow-up procedures, such as colposcopy with endocervical sampling, are suggested as clinically indicated."}, {"id": "37901732586e", "title": "PATHOLOGIC DIAGNOSIS:", "tag": "Cytology", "source": "Cytology_Form", "content": "Microscopic description:
Sections show nests and irregular cords of squamoid cells embedded in a collagenous stroma. Cytologic atypia is mild to absent, and mitotic figures are not identified. Immunohistochemical studies demonstrate increased p53 expression. The lesional cells are positive for p40, AE1/AE3, and CK19.

Comment:
The differential diagnosis includes squamous odontogenic tumor, mucoepidermoid carcinoma (no mucin-producing cells are identified by mucicarmine stain), and squamous cell carcinoma. Complete excision is recommended for definitive diagnosis.."}, {"id": "808d8e18c627", "title": "R-A", "tag": "Cytology", "source": "Cytology_Form", "content": "DIAGNOSIS:

MALIGNANT, most likely adenocarcinoma

MICROSCOPIC DESCRIPTION:
Some ball-like or glandular clusters of atypical epithelial cells with high nuclear to cytoplasmic ratio, coarse granular nuclear chromatin and prominent nucleoli are identified."}, {"id": "f4e98866b54f", "title": "R-HSV", "tag": "Cytology", "source": "Cytology_Form", "content": "DIAGNOSIS:

Benign squamous and respiratory epithelial cells with carbon-laden macrophages are

viral inclusions are present, suggesting of herpes simplex virus infection."}, {"id": "198ffe2a378d", "title": "R-N", "tag": "Cytology", "source": "Cytology_Form", "content": "DIAGNOSIS:

Some clusters of large neoplastic epithelial cells with high nuclear to cytoplasmic ratio, coarse granular nuclear chromatin and prominent nucleoli are identified."}, {"id": "f065fe31341a", "title": "R-SCC", "tag": "Cytology", "source": "Cytology_Form", "content": "DIAGNOSIS:

Some clusters or single cells with nuclear pleomorphism, hyperchromatism, and coarse chromatin are present. Tadpole cells and keratinization are also noted."}, {"id": "fea38bde6510", "title": "R-small cell", "tag": "Cytology", "source": "Cytology_Form", "content": "DIAGNOSIS:
MALIGNANT, most likely small cell carcinoma

Some clusters of cells with nuclear molding and crush artifact are seen. These cells have scant cytoplasm and hyperchromatic nuclei with finely granular chromatin and inconspicuous nucleoli."}, {"id": "5a110abbff20", "title": "R-Sus", "tag": "Cytology", "source": "Cytology_Form", "content": "DIAGNOSIS:
SUSPICIOUS FOR MALIGNANCY

MICROSCOPIC DESCRIPTION:
Some atypical cells exhibit high N/C ratio and atypical nuclear features but not conclusive for malignancy. Tissue biopsy is recommended for confirmation before undertaking definitive therapy."}, {"id": "21364e65d9bb", "title": "R-UN", "tag": "Cytology", "source": "Cytology_Form", "content": "DIAGNOSIS:
UNSATISFACTORY specimen

CYTOLOGY: Sputum

MICROSCOPIC DESCRIPTION:
Only superficial squamous cells are identified. No alveolar macrophages and respiratory epithelial cells are observed. This is an unsatisfactory specimen."}, {"id": "5d93419b7d40", "title": "SG -basaloid neoplasm", "tag": "Cytology", "source": "Cytology_Form", "content": "Basaloid neoplasm

1. If the tumor has characteristic features of basal cell adenoma/adenocarcinoma (e.g., a peripheral band of hyaline material): 

NEOPLASTIC CELLS PRESENT. Basal cell neoplasm of salivary gland origin (see Note). note: The cytologic features are compatible with either basal cell adenoma or basal cell adenocarci-noma. Distinction between the two cannot be made on cytologic material. Excision is recommended for precise classification. 

2. If the tumor lacks distinctive cytologic features: 

NEOPLASTIC CELLS PRESENT. Basaloid neoplasm (see Note). note: The differential diagnosis is broad in scope and includes basal cell adenoma, basal cell adenocarcinoma, the solid variant of adenoid cystic carcinoma, and nonsalivary gland neoplasms. Excision is recommended for precise classification, including intraoperative frozen section examination if clinically indicated"}, {"id": "0bc99bae5c09", "title": "SG-AUS", "tag": "Cytology", "source": "Cytology_Form", "content": "DIAGNOSIS:
Atypia of undetermined significance

Microscopic description:
It shows a few groups of atypical epithelial cells revealing
increased N:C ratio. However, air-drying artifact in this
alcohol-fixed smear makes the cytologic interpretation
difficult. The overall findings are suggestive but not
diagnostic of a neoplasm."}, {"id": "3c96628c2d97", "title": "SG-AUS (reactive / inflammation)", "tag": "Cytology", "source": "Cytology_Form", "content": "DIAGNOSIS:
Atypia of undetermined significance

Microscopic description:
It shows rare atypical cells with reactive and reparative atypia in an inflammatory background which is indefiite for a neoplasm."}, {"id": "abf709378d5b", "title": "SG-AUS-basaloid cells", "tag": "Cytology", "source": "Cytology_Form", "content": "DIAGNOSIS:
ATYPIA OF UNDETERMINED SIGNIFICANCE
Few clusters of basaloid cells with mild atypia. See note.

Evaluation limited by scant cellularity.

Note: While the aspirate may represent chronic sialadenitis with metaplasia and reactive changes, a salivary gland neoplasm with basaloid features cannot be completely excluded. Recommend clinical and radiologic correlations and additional sampling if clnically indicated."}, {"id": "100823fc932d", "title": "SG-AUS-oncocytic", "tag": "Cytology", "source": "Cytology_Form", "content": "DIAGNOSIS:
ATYPIA OF UNDETERMINED SIGNIFICANCE
Scant oncocytic cells with cytological and/or architectural atypia. See note.

Evaluation limited by scant cellularity.

Note: While the aspirate may represent oncocytic metaplasia or oncocytic hyperplasia, a neoplastic process cannot be entirely excluded. Recommend clinical and radiologic correlations and additional sampling if clincally indicated."}, {"id": "7e92be467814", "title": "SG-Benign neoplasm-Mixed tumor [SGPA]", "tag": "Cytology", "source": "Cytology_Form", "content": "DIAGNOSIS:
BENIGN NEOPLASM
Consistent with mixed tumor (pleomorphic adenoma)

MICROSCOPIC DESCRIPTION:
Presence of epithelial cells, mesencymal cells and fibrillar myxoid stroma. These findings are consistent with mixed tumor."}, {"id": "2cc1a24433ad", "title": "SG-Benign neoplasm-Warthin", "tag": "Cytology", "source": "Cytology_Form", "content": "DIAGNOSIS:
BENIGN NEOPLASM
Consistent with Warthin's tumor

MICROSCOPIC DESCRIPTION:
Flat sheets of oncocytic cells are present in a lymphocytic background. Warthin's tumor should be considered."}, {"id": "73efb496cd29", "title": "SG-benign/normal", "tag": "Cytology", "source": "Cytology_Form", "content": "DIAGNOSIS:
BENIGN/NORMAL

MICROSCOPIC DESCRIPTION:
Benign salivary lobules are seen. No malignant cells are found.

NOTE:
Clinical and radiologic correlations are needed to exclude a non-representative FNA sample."}, {"id": "f1d23f5a052f", "title": "SG-chronic sialadenitis", "tag": "Cytology", "source": "Cytology_Form", "content": "DIAGNOSIS:
Evaluation limited by scant cellularity
Consistent with chronic chronic sialadenitis. See note.

MICROSCOPIC DESCRIPTION:
It shows small groups of ductal cells with absent or scant acinar cells. 
Chronic inflammation is seen. No malignant cells are found.

Note: Clinical and radiologic correlations are recommended to ensure that the aspirate is representative of the lesion."}, {"id": "4c19a610b856", "title": "SG-Oncocytic", "tag": "Cytology", "source": "Cytology_Form", "content": "Neoplasm with oncocytoid feature. See note.

Note: The specimen shows a low-grade neoplasm with oncocytoid features. Some lymphocytes are seen in the background. 
The differential diagnosis includes Warthin tumor and other tumors with oncocytic change."}, {"id": "eda81fef3ae1", "title": "SG-SUMP-Basaloid cell", "tag": "Cytology", "source": "Cytology_Form", "content": "DIAGNOSIS:

Note: The specimen show a monomorphic population of basaloid cells with minimal nuclear atypia associated with fibrillary matrix. No mitoses or tumor necrosis is seen. The findings are suggestive of a cellular pleomorphic adenoma; however, other matrix-producing basaloid tumors such as basal cell adenoma, basal cell adenocarcinoma, and epithelial-myoepithelial carcinoma cannot be completely excluded."}, {"id": "7419d61cb69e", "title": "SG-SUMP-Clear cell", "tag": "Cytology", "source": "Cytology_Form", "content": "DIAGNOSIS:

Hypocellular specimen, however, findings are suggestive of a follicular lesion with some features suggestive of but not diagnostic for papillary carcinoma."}, {"id": "3d8c8258d4b6", "title": "T-A cytologic atypia.", "tag": "Cytology", "source": "Cytology_Form", "content": "DIAGNOSIS:
ATYPIA OF UNDETERMINED SIGNIFICANCE.
Focal cytologic atypia. 

CYTOLOGY: Thyroid gland, _, aspiration

ADEQUACY: Satisfactory for interpretation

MICROSCOPIC DESCRIPTION:
Smears show follicular cells which are predominantly benign appearing, but with occasional nuclear grooves or intranuclear inclusions. Papillary carcinoma cannot be confidently excluded. 

Note:
1. The diagnostic category is according to The Bethesda System for Reporting Thyroid Cytopathology.
2. Risk of malignancy: 6-18%.
3. Recommended management: Repeat FNA or lobectomy"}, {"id": "aa5f2cf46a9a", "title": "T-A-architectural atypia", "tag": "Cytology", "source": "Cytology_Form", "content": "ATYPIA OF UNDETERMINED SIGNIFICANCE. 

Sparsely cellular aspirate comprised of follicular cells with architectural atypia. Colloid is absent.

Note: Molecular testing or a repeat aspirate may be helpful if clinically indicated."}, {"id": "0201b68a22d5", "title": "T-A-Hurthle cell aspirates", "tag": "Cytology", "source": "Cytology_Form", "content": "DIAGNOSIS:
Atypia of Undetermined Significance
Hurthle cell aspirates

CYTOLOGY: Thyroid gland, right, aspiration

ADEQUACY: Satisfactory for interpretation

MICROSCOPIC DESCRIPTION:
It shows a sparsely cellular aspirate comprised almost exclusively of Hurthle cells with minimal colloid and some lymphocytes in the background.

NOTE: Although this pattern is very low risk, a folicular neoplasm, Hurthle cell type, cannot be entirely excluded.
Please also correlate if patient has a history of Hashimoto thyroiditis. Clinical-radiologic correlation is advised."}, {"id": "cb967409adae", "title": "T-B", "tag": "Cytology", "source": "Cytology_Form", "content": "DIAGNOSIS:
BENIGN
Consistent with a benign follicular nodule

CYTOLOGY: Thyroid, __, aspiration
ADEQUACY: Satisfactory for interpretation

MICROSCOPIC DESCRIPTION:
Smears show some well-preserved groups of benign and uniform-appearing follicular cells and some colloid material. No malignant cells are identified.

Note:
1. The diagnostic category is according to The Bethesda System for Reporting Thyroid Cytopathology.
2. Risk of malignancy: 2-7%. 
3. Recommended management: Clinical and sonographic follow-up."}, {"id": "649ebebdea1f", "title": "T-B-Colloid-Cyst", "tag": "Cytology", "source": "Cytology_Form", "content": "DIAGNOSIS:
BENIGN
Consistent with colloid nodule with cystic change

CYTOLOGY: Thyroid gland, ______, aspiration

MICROSCOPIC DESCRIPTION:
Smears show abundant colloid,
consistent with colloid nodule. There are macrophages but no
epithelial cells.

Note:
1. The diagnostic category is according to The Bethesda
   System for Reporting Thyroid Cytopathology.
2. Cystic change can occur in nodular goiter and papillary
   carcinoma. Please correlate the sonographic findings and
   aspirate if residual solid part is present."}, {"id": "0221271bb702", "title": "T-B-Cyst", "tag": "Cytology", "source": "Cytology_Form", "content": "DIAGNOSIS:
NON-DIAGNOSTIC OR UNSATISFACTORY
Cystic fluid only

CYTOLOGY: Thyroid gland, _, fine needle aspiration

MICROSCOPIC DESCRIPTION:
The specimen is nondiagnostic because it consists almost exclusively of histiocytes. Recommend correlation with cyst size and complexity on ultrasound to assist with further management of the lesion. 

Note:
1. The diagnostic category is according to The Bethesda
System for Reporting Thyroid Cytopathology.
2. Cystic change can occur in nodular goiter and papillary carcinoma. Please correlate the sonographic findings and aspirate if residual solid part is present."}, {"id": "4e1cc829b7f5", "title": "T-B-Hashimoto", "tag": "Cytology", "source": "Cytology_Form", "content": "DIAGNOSIS:
BENIGN
Consistent with chronic lymphocytic (Hashimoto''''s) thyroiditis

CYTOLOGY: Thyroid gland, ______, aspiration

MICROSCOPIC DESCRIPTION:
Smears show some clusters of Hurthle cells and many lymphocytes and plasma cells in the background. Findings are suggestive of chronic lymphocytic (Hashimoto's) thyroiditis.

Note:
1. The diagnostic category is according to The Bethesda System for Reporting Thyroid Cytopathology.
2. Risk of malignancy: 2-7%. 
3. Recommended management: Clinical and sonographic follow-up."}, {"id": "b4e7a40c7f1a", "title": "T-B-Hashimoto (不知道病人有沒有)", "tag": "Cytology", "source": "Cytology_Form", "content": "DIAGNOSIS:
BENIGN
Numerous polymorphic lymphoid cells and scattered oncocytic cells.

CYTOLOGY: Thyroid gland, ______, aspiration

Note: The findings are suggestive of chronic lymphocytic (Hashimoto) thyroiditis in the proper clinical setting."}, {"id": "f801430b321e", "title": "T-B-NG", "tag": "Cytology", "source": "Cytology_Form", "content": "DIAGNOSIS:
BENIGN
Consistent with nodular goiter (follicular nodular disease)

CYTOLOGY: Thyroid, ___ lobe, aspiration

ADEQUACY: Satisfactory for interpretation

MICROSCOPIC DESCRIPTION:
Smears show a macrofollicular lesion composed of moderate to abundant follicular cells arranged in honeycomb flat sheets and some colloid material. Findings are suggestive of nodular goiter.

Note:
1. The diagnostic category is according to The Bethesda System for Reporting Thyroid Cytopathology.
2. Risk of malignancy: 2-7%. 
3. Recommended management: Clinical and sonographic follow-up."}, {"id": "5630d8d55d15", "title": "T-B-NG-C", "tag": "Cytology", "source": "Cytology_Form", "content": "DIAGNOSIS:
BENIGN
Consistent with nodular goiter (follicular nodular disease) with cystic change

MICROSCOPIC DESCRIPTION:
Smears show a macrofollicular lesion composed of moderate follicular cells arranged in honeycomb flat sheets, abundant macrophages and some colloid material. Findings are suggestive of nodular goiter with cystic change.

Note:
1. The diagnostic category is according to The Bethesda System for Reporting Thyroid Cytopathology.
2. Risk of malignancy: 2-7%. 
3. Recommended management: Clinical and sonographic follow-up."}, {"id": "952e160b8065", "title": "T-B-NG-H", "tag": "Cytology", "source": "Cytology_Form", "content": "DIAGNOSIS:
BENIGN
Consistent with nodular goiter (follicular nodular disease) with Hurthle cell change

MICROSCOPIC DESCRIPTION:
Smears show follicular cells and Hurthle cells in sheets or dispersed single cells. Colloid and foamy histiocytes are also present. Nodular goiter with Hurthle cell change is considered.

Note:
1. The diagnostic category is according to The Bethesda System for Reporting Thyroid Cytopathology.
2. Risk of malignancy: 2-7%. 
3. Recommended management: Clinical and sonographic follow-up."}, {"id": "4f0e67caeb83", "title": "T-B-subacute granulomatous thyroiditis", "tag": "Cytology", "source": "Cytology_Form", "content": "DIAGNOSIS:
BENIGN
see NOTE. 

CYTOLOGY: Thyroid, left, aspiration
ADEQUACY: Satisfactory for interpretation

MICROSCOPIC DESCRIPTION:
Scattered multinucleated giant cells are seen in a background of lymphocytes and degenerate cells.
    
NOTE: Subacute granulomatous thyroiditis should be considered. Please correlate clinically."}, {"id": "4ada5c62cf96", "title": "T-Colloid", "tag": "Cytology", "source": "Cytology_Form", "content": "DIAGNOSIS:
BENIGN
Consistent with colloid nodule

MICROSCOPIC DESCRIPTION:
Smears show abundant colloid and scant follicular cells, consistent with colloid nodule.

Note:
1. The diagnostic category is according to The Bethesda System for Reporting Thyroid Cytopathology.
2. Risk of malignancy: 2-7%. 
3. Recommended management: Clinical and sonographic follow-up."}, {"id": "b9ad1ec672a4", "title": "T-cyst", "tag": "Cytology", "source": "Cytology_Form", "content": "DIAGNOSIS:
NON-DIAGNOSTIC OR UNSATISFACTORY
Cystic fluid only

CYTOLOGY: Thyroid gland, ____, aspiration

MICROSCOPIC DESCRIPTION:
Smears contain mostly macrophages but no epithelial cells or colloid, consistent with cystic change.

Note:
1. The diagnostic category is according to The Bethesda
   System for Reporting Thyroid Cytopathology.
2. Cystic change can occur in nodular goiter and papillary
   carcinoma. Please correlate the sonographic findings and
   aspirate if residual solid part is present."}, {"id": "e400aee22f02", "title": "T-FN", "tag": "Cytology", "source": "Cytology_Form", "content": "DIAGNOSIS:
Suspicious for a Follicular Neoplasm

MICROSCOPIC DESCRIPTION:
Cellular aspirate of follicular cells with a predominantly microfollicular architecture, scattered isolated cells, and scant colloid.

Note:
1. The diagnostic category is according to The Bethesda System for Reporting Thyroid Cytopathology.
2. The differential diagnoses include nodular goiter, follicular adenoma, follicular variant of papillary carcinoma, follicular carcinoma, and the recently described NIFTP, which have overlapping cytomorphologic features and cannot be accurately distinguished by FNA alone. 
3. Risk of malignancy: 23-34%.
4. Recommended management: Molecular testing, diagnostic lobectomy."}, {"id": "cf17176673e9", "title": "T-FN DDx PTC, NIFTP", "tag": "Cytology", "source": "Cytology_Form", "content": "DIAGNOSIS:
Follicular Neoplasm

MICROSCOPIC DESCRIPTION:
Cellular aspirate of follicular cells with a predominantly microfollicular architecture, scattered isolated cells, and scant colloid.

Note:
Although the architectural features suggest a follicular neoplasm, some nuclear features raise the possibility of an invasive follicular variant of papillary carcinoma or its indolent counterpart, NIFTP; difinitive distinction among these entities is not possible on cytologic mateiral."}, {"id": "a3325b6287a7", "title": "T-FN SEE NOTE", "tag": "Cytology", "source": "Cytology_Form", "content": "DIAGNOSIS:
Suspicious for a Follicular Neoplasm. See Note.

MICROSCOPIC DESCRIPTION:
Cellular aspirate of follicular cells with a predominantly microfollicular architecture, scattered isolated cells, and scant colloid.

Note: Although the architectural features suggest a follicular neoplasm, some nuclear features raise the possibility of an invasive follicular variant of papillary carcinoma or its recently described indolent counterpart, NIFTP; definitive distinction among these entities is not possible on cytologic material."}, {"id": "6415eeb54924", "title": "T-FN-Sus", "tag": "Cytology", "source": "Cytology_Form", "content": "Example 4 SUSPICIOUS FOR FOLLICULAR NEOPLASM (SEE NOTE).

Note: Although the architectural features suggest a follicular neoplasm, some nuclear features raise the possibility of an invasive follicular variant of papillary carcinoma or its recently described indolent counterpart, NIFTP; definitive distinction among these entities is not possible on cytologic material."}, {"id": "9d4d47b4a5e0", "title": "T-HN", "tag": "Cytology", "source": "Cytology_Form", "content": "DIAGNOSIS:
Suspicious for a follicular neoplasm, Hurthle cell (oncocytic) type

MICROSCOPIC DESCRIPTION:
Smears show exclusively moderate to abundant Hurthle cells in dispersed single cells or clusters, absence of colloid and no lymphocytes. 

Note:
1. The diagnostic category is according to The Bethesda System for Reporting Thyroid Cytopathology.
2. The risk of malignancy ranges from 10 to 40%.
3. Recommended management: Diagnostic surgical excision."}, {"id": "2983aacd7fcb", "title": "T-Hurthle (DDx)", "tag": "Cytology", "source": "Cytology_Form", "content": "DIAGNOSIS:
Hurthle cell change. (please see description)

CYTOLOGY: Thyroid gland, ____, aspiration

ADEQUACY:
Satisfactory for interpretation

MICROSCOPIC DESCRIPTION:
Smears show Hurthle cells in groups or dispersed single cells with round and eccentric nuclei. 
A few colloid and lymphocytes are present in the background.  
The differential diagnosis includes chronic lymphocytic thyroiditis, nodular goiter with Hurthle cell change and Hurthle cell neoplasm."}, {"id": "f14a21d44168", "title": "T-M-PAP", "tag": "Cytology", "source": "Cytology_Form", "content": "DIAGNOSIS:
MALIGNANT
Papillary carcinoma

CYTOLOGY: Thyroid gland, _lobe, aspiration
ADEQUACY: Satisfactory for interpretation
MICROSCOPIC DESCRIPTION:
Smears show moderate to abundant atypical follicular cells in sheets, follicles and papillary groups. The atypical follicular cells have characteristic nuclear features of papillary carcinoma, including enlarged nuclei with ground glass feature, nuclear grooves and intranuclear inclusions. Scant colloid is found.

Note:
1. The diagnostic category is according to The Bethesda System for Reporting Thyroid Cytopathology.
2. The risk of malignancy ranges from 97-100%.
3. Recommended management: Near-total thyroidectomy or lobectomy
4. A small propotion of cases (~3-4%) diagnosed as malignant, compatible with PTC, may prove to be NIFTP on histology. 

(This case has been peer reviewed by two doctors.)"}, {"id": "d2b62a0c3d05", "title": "T-M-PAP DDx NIFTP", "tag": "Cytology", "source": "Cytology_Form", "content": "DIAGNOSIS:
MALIGNANT
Papillary carcinoma

MICROSCOPIC DESCRIPTION:
Smears show moderate to abundant atypical follicular cells in sheets, follicles and papillary groups. The atypical follicular cells have characteristic nuclear features of papillary carcinoma, including enlarged nuclei with ground glass feature, nuclear grooves and intranuclear inclusions. Scant colloid is found.
    
Note:
With the recent reclassification of a subset of indolent thyroid malignancies as NIFTP, the positive predictive value of the malignant category for thyroid FNA is expected to drop from 99 to about 94-96%. Thus, a small proportion of cases is interpreted as malignant by FNA my prove to be NIFTP upon histolgic examination."}, {"id": "9d6e114bba68", "title": "T-Sus-PAP", "tag": "Cytology", "source": "Cytology_Form", "content": "DIAGNOSIS:

Note:

Architectural distortion: not identified/mild/moderate/severe
Nancy index:
  absence of significant histological disease (grade 0)
  chronic inflammatory infiltrate with no acute inflammatory infiltrate (grade 1)
  mildly active disease (grade 2)
  moderately active disease (grade 3)
  severely active disease (grade 4)
Granuloma: not identified/present in section____.
Paneth metaplasia in distal colon (splenic flexure and beyond): not identified/present in section____.
Pyloric metaplasia: not identified/present in section____.
Basal plasmacytosis: not identified/present in section____.
 Neutrophilic infiltrate:  lamina propria   cryptitis   microabscess
Dysplasia: not identified/indefinite for dysplasia/present in section____
(1) Conventional dysplasia: low-grade/high-grade 
(2) Nonconventional dysplasia: type: hypermucinous/goblet cell deficient/crypt cell dysplasia/traditional serrated adenoma (TSA)-like/sessile serrated lesion (SSL)-like/serrated dysplasia, no otherwise specified. 
Fissuring ulcer: not identified/present in section____.
Ancillary studies:
  No invasive carcinoma is demonstrated by AE1/AE3.     
  No viral inclusion is demonstrated by anti-CMV immunostain.    

Overall assessment: (optional)
Normal or nearly normal intestinal tissue 
Mild non-specific chronic inflammation
Quiescent colitis
More supportive of acute colitis
More supportive of ulcerative colitis
More supportive of Crohn’s disease
Supportive of inflammatory bowel disease but further subclassification can't be done

Comment:
The diagnosis of inflammatory bowel disease cannot be made by histology alone. Please correlate with clinical presentation.
The absence of inflammation or only mild inflammation can be due to sampling of uninflammatory sites or treatment and cannot be used against the diagnosis of inflammatory bowel disease.

Explanatory Note:
Please make the diagnosis and rule out other disease (such as amebiasis, lymphoma, etc.) before grading the lesions.  
Nancy Index: 
Grade 0: No or only mild increase in chronic inflammatory cells
Grade 1: Moderate or severe increase in chronic inﬂammatory cells (lymphocytes, plasma cells, and eosinophils) deﬁned as presence of an increase in chronic inﬂammatory cells that is easily apparent.
Grade 2: Mild increase in neutrophils deﬁned as few or rare neutrophils in lamina propria or in the epithelium that are difﬁcult to see
Grade 3: Moderate or severe increase neutrophils deﬁned as presence of multiple clusters of neutrophils in lamina propria and/or in epithelium that are easily apparent
Grade 4: Ulcers or erosions deﬁned as loss of colonic crypts replaced with “immature” granulation tissue (disorganized blood vessels with extravasated neutrophils) or the presence of ﬁbrinopurulent exudate
CMV immunostaining is suggested for all cases with ulceration and treatment refractory colitis
Some antibody clones (such as the clone used in Ventana machine) showed non-specific cytoplasmic granular staining in neutrophils. Please only interpretate the cells with strong positive nuclear staining as positive. 
CMV immunostaining should be graded as low grade (<=4 positive cells per piece of tissue) or high grade (>5 positive cells in at least one piece of tissue)
SATB2 is lost in 40% of IBD-associated dysplasia but not loss in regenerative colonic mucosa. Hence, SATB2 immunostaining is suggested for cases with indefinite for dysplasia.
Lymphoid aggregate and lymphoid follicle formation are normal finding for terminal ileum specimen. Should not diagnose as inflammatory tissue only based on this finding. 
Histologic remission is defined as Nancy grade 0 or 1 and is used as the criteria for treatment end point. 
The American College of Gastroenterology and American Gastroenterology Association suggest that the presence or absence of dysplasia is confirmed by at least one pathologist who is skilled in GI pathology or who has broad experience with dysplasia in UC. 

 

(A) Ulceration of colonic mucosa with inflamed granulation tissue corresponding to grade 4 of the Nancy index (HES ×200). (B) Ulceration of colonic mucosa with neutrophils in fibrin corresponding to grade 4 of the Nancy index (HES ×200). (C) Presence of multiple clusters of neutrophils in lamina propria and/or in epithelium that are easily apparent. Acute inflammatory cells infiltrate is moderate to severe, corresponding to grade 3 of the Nancy index. (HES ×200). (D) Presence of few or rare neutrophils in lamina propria or in the epithelium that are difficult to see. Acute inflammatory cells infiltrate is mild, corresponding to grade 2 of the Nancy index (HES ×200). (E) Biopsy specimen showing no acute inflammatory cells infiltrate and presence of a moderate-to-severe increase in chronic inflammatory cells number corresponding to grade 1 of the Nancy index (HES ×200). (F) Biopsy specimen showing a mild increase in chronic inflammatory cell number. In this case, it defines a grade 0 of the Nancy index (HES ×200). HES, hematoxylin-eosin-saffron.
Marchal-Bressenot et al. Gut, 2016"}, {"id": "d2df8e3880c3", "title": "IBD checklist (old version)", "tag": "GI", "source": "GI_Form", "content": "Microscopic description:

A3: ileocecal valve
A4-A8 colon
A9: pericolonic fat    

Microscopic description:
The colonic tissue shows variable thickness of muscularis propria with degenerative
change of myocytes, accompanied by delicate interstitial fibrosis in the muscularis
propria, especially the inner circular layer which is highlighted by Masson Trichrome
stain. Vascular congestion of bowel wall and focal submucosal fibrosis are also seen. Ganglion cells are present throughout
the colonic segments that were sampled. No evidence of inflammation or infection is
seen. The appendix is unremarkable.

Immunohistochemically, S100 stain demonstrates the neural plexuses without remarkable
changes. CD117 highlights the interstitial cells of Cajal. SMA and desmin show no
obvious decreased staining in the muscular layer. Staining for Congo red is negative,
excluding amyloidosis. No inclusion or microorganism is demonstrated by PAS stain.

The overall features suggest motility disorder which can be primary or secondary to
systemic conditions such as diabetes mellitus, scleroderma or drug injury etc.
Clinical correlation is recommended.

scattered and weak staining within individual tumor cells.

endometrial stromal sarcoma.

mostly likely according to the histology and
immunophenotype."}, {"id": "77263fb70395", "title": "LSIL noendo", "tag": "GYN", "source": "GYN_Form", "content": "PATHOLOGIC DIAGNOSIS:

The biopsy core is hypercellular with 60% cellularity and decreased normal trilineage

distribution and morphology of megakaryocytes are essentially unremarkable.

Immunohistochemical study shows that the immature cells express CD34 and CD117. CD61,
CD71 and MPO stainings highlight megakaryocytes, erythroblasts and mature myeloid
cells, respectively. These findings indicate non-M3 acute myeloid leukemia, most
likely AML-M2.

SPECIAL STAIN GROUP II:
1. Prussian blue stain is positive indicating substantial iron storage.
2. Reticulin stain shows a normal reticulin pattern without myelofibrosis.

IMMUNOHISTOCHEMICAL STUDY: CD34, CD61, CD71, CD117, MPO."}, {"id": "13b2cd716604", "title": "plasma cell myeloma.", "tag": "Hema", "source": "Hema_Form", "content": "plasma cell myeloma.

Microscopic description:
Sections show cutaneous tissue with a diffuse atypical

subcutaneous layer. The infiltrate atypical lymphocytes are

and CD45 but not CD4, CD5, CD8, CD20, CD25, CD30, TdT, CD1a,

labeling index by Ki67 is up to 80%. In situ hybridization
for EBV-encoded mRNA (EBER) is negative.

Although adult T-cell lymphoma is among the differentials,
it is unlikely as the tumor cells are negative for CD4 and
CD25. Please correlate with the HTLV-1 status. If the
serum is positive for anti-HTLV, this is adult T-cell
leukemia/lymphoma with unsual phenotype. If negative, this
is peripheral T-cell lymphoma, not otherwise specified
PTCL"}, {"id": "cd5feca41990", "title": "Reactive hyperplasia", "tag": "Hema", "source": "Hema_Form", "content": "Reactive hyperplasia.

Dr. Shih-Sung Chuang concurs with this diagnosis.

const TAGS = ['Breast','GI','GYN','Skin','Hema','Oral / H&N','Thoracic','CNS','GU','Liver / GB','Cytology','Bone / Soft tissue','General'];

let allTemplates = [];
let filtered = [];
let activeTag = 'ALL';
let activeId = null;
let editingId = null;
let query = '';

// Load data: try localStorage overrides, then fetch templates.json
async function loadData() {
  const base = EMBEDDED_DATA;
  const overrides = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
  // overrides: { id: templateObj | null (deleted) }
  let merged = base
    .filter(t => overrides[t.id] !== null)
    .map(t => overrides[t.id] || t);
  // Add new user-created templates
  for (const [id, val] of Object.entries(overrides)) {
    if (val && !base.find(t => t.id === id)) merged.push(val);
  }
  allTemplates = merged;
}

function saveOverride(tmpl) {
  const overrides = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
  overrides[tmpl.id] = tmpl;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(overrides));
}

function deleteOverride(id) {
  const overrides = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
  overrides[id] = null;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(overrides));
}

function buildTags() {
  const tagbar = document.getElementById('tagbar');
  const counts = {};
  TAGS.forEach(t => counts[t] = 0);
  allTemplates.forEach(t => { if (counts[t.tag] !== undefined) counts[t.tag]++; });
  tagbar.innerHTML = `<button class="tag-btn all active" data-tag="ALL">All (${allTemplates.length})</button>`;
  TAGS.forEach(tag => {
    if (!counts[tag]) return;
    const btn = document.createElement('button');
    btn.className = 'tag-btn';
    btn.dataset.tag = tag;
    btn.textContent = `${tag} (${counts[tag]})`;
    tagbar.appendChild(btn);
  });
  tagbar.querySelectorAll('.tag-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      activeTag = btn.dataset.tag;
      tagbar.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });
  });

  // Populate modal select
  const sel = document.getElementById('f-tag');
  sel.innerHTML = TAGS.map(t => `<option value="${t}">${t}</option>`).join('');
}

function highlight(text, q) {
  if (!q) return text;
  const escaped = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(escaped, 'gi'), m => `<mark>${m}</mark>`);
}

function render() {
  const q = query.trim().toLowerCase();
  filtered = allTemplates.filter(t => {
    const tagMatch = activeTag === 'ALL' || t.tag === activeTag;
    if (!tagMatch) return false;
    if (!q) return true;
    return t.title.toLowerCase().includes(q) || t.content.toLowerCase().includes(q);
  });

  document.getElementById('count').textContent = `${filtered.length} forms`;

  const list = document.getElementById('list');
  if (!filtered.length) {
    list.innerHTML = '<div class="no-results">No results found</div>';
    showContent(null);
    return;
  }

  list.innerHTML = filtered.map(t => {
    const snippet = t.content.replace(/\n/g,' ').slice(0, 80);
    return `<div class="note-item${t.id === activeId ? ' active' : ''}" data-id="${t.id}">
      <div class="note-title">${highlight(escHtml(t.title), query)}</div>
      <div class="note-tag">${escHtml(t.tag)}</div>
      <div class="note-snippet">${escHtml(snippet)}</div>
    </div>`;
  }).join('');

  list.querySelectorAll('.note-item').forEach(el => {
    el.addEventListener('click', () => {
      activeId = el.dataset.id;
      render();
      showContent(allTemplates.find(t => t.id === activeId));
    });
  });

  // Auto-select first if current activeId not in filtered
  if (!filtered.find(t => t.id === activeId)) {
    activeId = filtered[0].id;
    render();
  }
  showContent(allTemplates.find(t => t.id === activeId));
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showContent(tmpl) {
  const panel = document.getElementById('content-panel');
  if (!tmpl) {
    panel.innerHTML = '<div id="empty-state">← Select a form to view</div>';
    return;
  }
  const q = query.trim();
  panel.innerHTML = `
    <div id="content-header">
      <div>
        <div id="content-title">${escHtml(tmpl.title)}</div>
        <div id="content-tag-badge">${escHtml(tmpl.tag)}</div>
      </div>
      <div id="content-actions">
        <button class="btn-action" id="btn-copy">Copy</button>
        <button class="btn-action btn-edit" id="btn-edit">Edit</button>
        <button class="btn-action btn-delete" id="btn-del">Delete</button>
      </div>
    </div>
    <div id="content-body">
      <div id="content-text">${highlight(escHtml(tmpl.content), q)}</div>
    </div>`;

  document.getElementById('btn-copy').addEventListener('click', () => {
    navigator.clipboard.writeText(tmpl.content);
    toast('Copied!');
  });
  document.getElementById('btn-edit').addEventListener('click', () => openModal(tmpl));
  document.getElementById('btn-del').addEventListener('click', () => {
    if (confirm(`Delete "${tmpl.title}"?`)) {
      deleteOverride(tmpl.id);
      allTemplates = allTemplates.filter(t => t.id !== tmpl.id);
      activeId = null;
      buildTags();
      render();
      toast('Deleted');
    }
  });
}

function openModal(tmpl = null) {
  editingId = tmpl ? tmpl.id : null;
  document.getElementById('modal-title').textContent = tmpl ? 'Edit Template' : 'New Template';
  document.getElementById('f-title').value = tmpl ? tmpl.title : '';
  document.getElementById('f-tag').value = tmpl ? tmpl.tag : TAGS[0];
  document.getElementById('f-content').value = tmpl ? tmpl.content : '';
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('f-title').focus();
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function saveModal() {
  const title = document.getElementById('f-title').value.trim();
  const tag = document.getElementById('f-tag').value;
  const content = document.getElementById('f-content').value.trim();
  if (!title || !content) { alert('Title and content are required'); return; }

  const id = editingId || Math.random().toString(36).slice(2, 14);
  const tmpl = { id, title, tag, source: 'user', content };
  saveOverride(tmpl);

  if (editingId) {
    const idx = allTemplates.findIndex(t => t.id === editingId);
    if (idx >= 0) allTemplates[idx] = tmpl;
  } else {
    allTemplates.unshift(tmpl);
    activeId = id;
  }

  closeModal();
  buildTags();
  render();
  toast(editingId ? 'Updated!' : 'Saved!');
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

// Search
document.getElementById('search').addEventListener('input', e => {
  query = e.target.value;
  render();
});

// Keyboard shortcut: Cmd+K or / to focus search
document.addEventListener('keydown', e => {
  if ((e.metaKey && e.key === 'k') || (e.key === '/' && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA')) {
    e.preventDefault();
    document.getElementById('search').focus();
    document.getElementById('search').select();
  }
});

// Modal events
document.getElementById('btn-add').addEventListener('click', () => openModal());
document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-cancel').addEventListener('click', closeModal);
document.getElementById('modal-save').addEventListener('click', saveModal);
document.getElementById('modal-overlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// Boot
(async () => {
  await loadData();
  buildTags();
  render();
})();
</script>
